name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          SITE_NAME: ${{ vars.SITE_NAME }}
          SITE_DESCRIPTION: ${{ vars.SITE_DESCRIPTION }}
          AUTHOR_DID: ${{ vars.AUTHOR_DID }}
          PUBLICATION_AT_URI: ${{ vars.PUBLICATION_AT_URI }}
          DRAFT_COLLECTION_NSID: ${{ vars.DRAFT_COLLECTION_NSID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=disnetdev --branch="$DEPLOY_BRANCH"
