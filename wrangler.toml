name = "disnetdev"
compatibility_date = "2025-11-12"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Bind the KV namespace used for OAuth state/session storage (see src/lib/server/kv.ts).
# Create the namespace with `wrangler kv namespace create disnetdev-kv` and paste the id here.
[[kv_namespaces]]
binding = "KV"
id = "eb75dab3d008415f94233d619cef8e96"

[env.production.vars]
AUTHOR_DID = "did:plc:4vjd3fe2cgzq5d24j4f3zvar"
PUBLICATION_AT_URI = "at://did:plc:4vjd3fe2cgzq5d24j4f3zvar/site.standard.publication/3mjz2bzni752x"
DRAFT_COLLECTION_NSID = "com.disnetdev.blog.draft"
SITE_NAME = "disnetdev"
SITE_DESCRIPTION = "home page for disnetdev"
PUBLIC_SITE_URL = "https://www.disnetdev.com"

